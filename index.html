<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-6B: Gas Collection over Water</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1a2744; --gold:#c9a84c; --gold-light:#e8c96a;
    --white:#fff; --light-bg:#f4f6fa; --mid-gray:#e2e6ef;
    --text:#1a2744; --text-light:#5a6a8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--light-bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--navy);padding:14px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .tag{background:var(--gold);color:var(--navy);font-weight:700;font-size:12px;padding:3px 10px;border-radius:4px;letter-spacing:.04em;}
  header h1{color:#fff;font-size:18px;font-weight:600;}
  .eq-bar{background:#eef2fa;border-bottom:1px solid var(--mid-gray);padding:10px 32px;display:flex;align-items:center;gap:10px;font-size:14px;flex-wrap:wrap;}
  .eq-label{color:var(--text-light);font-size:13px;font-weight:500;}
  .eq-formula{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--navy);font-weight:500;}
  .main{flex:1;display:flex;flex-direction:column;padding:16px 20px;gap:12px;}
  .canvas-wrap{background:white;border-radius:12px;border:1px solid var(--mid-gray);overflow:hidden;box-shadow:0 2px 12px rgba(26,39,68,.07);}
  canvas{display:block;width:100%;}
  .controls{background:white;border-radius:12px;border:1px solid var(--mid-gray);padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .ctrl-group{display:flex;align-items:center;gap:8px;}
  .ctrl-label{font-size:13px;font-weight:600;color:var(--text-light);white-space:nowrap;}
  input[type=range]{-webkit-appearance:none;width:120px;height:5px;background:var(--mid-gray);border-radius:3px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--gold);border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .val-badge{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--navy);color:var(--gold);padding:2px 8px;border-radius:4px;min-width:60px;text-align:center;}
  .btn{padding:8px 18px;border-radius:7px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--navy);color:white;} .btn-primary:hover{background:#263660;}
  .btn-gold{background:var(--gold);color:var(--navy);} .btn-gold:hover{background:var(--gold-light);}
  .info-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .ic{background:white;border-radius:10px;border:1px solid var(--mid-gray);padding:12px 14px;}
  .ic-label{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;}
  .ic-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;color:var(--navy);margin-top:3px;}
  .ic-unit{font-size:11px;color:var(--text-light);font-weight:400;}
  .ic.hi{border-color:var(--gold);background:#fdf9ef;} .ic.hi .ic-val{color:#8a6010;}
  .step-row{display:flex;gap:8px;flex-wrap:wrap;}
  .sp{display:flex;align-items:center;gap:7px;background:white;border:1.5px solid var(--mid-gray);border-radius:20px;padding:5px 12px 5px 7px;font-size:12px;font-weight:500;color:var(--text-light);transition:all .3s;}
  .sp.active{border-color:var(--gold);background:#fdf9ef;color:var(--navy);font-weight:600;}
  .sd{width:8px;height:8px;border-radius:50%;background:var(--mid-gray);transition:all .3s;}
  .sp.active .sd{background:var(--gold);}
</style>
</head>
<body>
<header>
  <span class="tag">G-6B</span>
  <h1>Gas Collection over Water</h1>
</header>
<div class="eq-bar">
  <span class="eq-label">Reaction:</span>
  <span class="eq-formula">2KClO₃(s) → 2KCl(s) + 3O₂(g)</span>
  <span class="eq-label" style="margin-left:20px">Dalton's Law:</span>
  <span class="eq-formula">P<sub>total</sub> = P<sub>O₂</sub> + P<sub>H₂O</sub></span>
</div>
<div class="main">
  <div class="canvas-wrap"><canvas id="cvs"></canvas></div>
  <div class="step-row">
    <div class="sp active" id="sp0"><div class="sd"></div>① Setup</div>
    <div class="sp" id="sp1"><div class="sd"></div>② Heating</div>
    <div class="sp" id="sp2"><div class="sd"></div>③ Gas Bubbling</div>
    <div class="sp" id="sp3"><div class="sd"></div>④ Water Displaced</div>
    <div class="sp" id="sp4"><div class="sd"></div>⑤ Complete</div>
  </div>
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Temperature</span>
      <input type="range" id="sT" min="20" max="120" value="20">
      <span class="val-badge" id="vT">20 °C</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Atm. Pressure</span>
      <input type="range" id="sP" min="740" max="780" value="760">
      <span class="val-badge" id="vP">760 mmHg</span>
    </div>
    <button class="btn btn-primary" id="btnPlay">▶ Start</button>
    <button class="btn btn-gold" id="btnReset">↺ Reset</button>
  </div>
  <div class="info-row">
    <div class="ic"><div class="ic-label">Temperature</div><div class="ic-val" id="ivT">20<span class="ic-unit"> °C</span></div></div>
    <div class="ic hi"><div class="ic-label">P<sub>atm</sub> (atmospheric)</div><div class="ic-val" id="ivPatm">760<span class="ic-unit"> mmHg</span></div></div>
    <div class="ic hi"><div class="ic-label">P<sub>H₂O</sub> (vapor)</div><div class="ic-val" id="ivPw">17.5<span class="ic-unit"> mmHg</span></div></div>
    <div class="ic"><div class="ic-label">Water Displaced</div><div class="ic-val" id="ivW">0<span class="ic-unit"> %</span></div></div>
  </div>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx  = cvs.getContext('2d');
const LW = 920, LH = 480;

// ─── GEOMETRY ────────────────────────────────────────────────────────────────
// Flask (round-bottom, left side)
const FL = { x:60, y:110, w:100, h:120, neckW:30, neckH:45 };
const FL_CX = FL.x + FL.w / 2;
const STOPPER_Y = FL.y - 4;

// Trough (rectangular glass tank)
const TR = { x:260, y:295, w:630, h:150 };
// Water surface inside trough
const WATER_Y = TR.y + 22;

// Collection cylinder (inverted, open bottom submerged in trough)
const CY = { x:700, y:88, w:120, h:230, wall:5 };
const CY_CX      = CY.x + CY.w / 2;
const CY_BOTTOM  = CY.y + CY.h;          // open bottom rim
const CY_ITOP    = CY.y + CY.wall;       // inner top (closed)
const CY_IBOT    = CY_BOTTOM;            // inner bottom (open)
const CY_IX      = CY.x + CY.wall;
const CY_IW      = CY.w - CY.wall * 2;

// Tube geometry
// Path: Flask stopper → right along flask level → bend down →
//       horizontal run BELOW trough bottom → bend up → rise into cylinder open bottom
const TUBE_W = 7;
const T_EXIT_X  = FL_CX;                 // exit x from stopper
const T_EXIT_Y  = STOPPER_Y - 2;         // exit y
const T_HORIZ_X = FL_CX + 50;            // short horizontal exit before bending down
const T_RUN_Y   = TR.y + TR.h + 16;      // horizontal run below trough bottom
const T_DOWN_X  = FL_CX + 50;            // x of vertical drop column
const T_UP_X    = CY_CX;                 // x of vertical rise into cylinder
const T_TIP_Y   = CY_BOTTOM - 16;        // tube tip inside cylinder (above open rim)

// ─── STATE ───────────────────────────────────────────────────────────────────
let prog = 0, running = false, fid = null;
let flamePulse = 0, wave = 0;
let bubbles = [];
let T = 20, Patm = 760;

function vp(t) {
  if(t<=10) return 9.2;  if(t<=15) return 12.8; if(t<=20) return 17.5;
  if(t<=25) return 23.8; if(t<=30) return 31.8;  if(t<=40) return 55.3;
  if(t<=50) return 92.5; if(t<=60) return 149.4; if(t<=70) return 233.7;
  if(t<=80) return 355.1;if(t<=90) return 525.8; if(t<=100) return 760;
  return 760+(t-100)*27;
}

// Water top inside cylinder
// prog=0 → full (water top = CY_ITOP)
// prog=1 → empty (water top = CY_IBOT)
function cylWaterTop() {
  return CY_ITOP + (CY_IBOT - CY_ITOP) * prog;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function updateCards() {
  const Pw = vp(T);
  document.getElementById('ivT').innerHTML     = T + '<span class="ic-unit"> °C</span>';
  document.getElementById('ivPatm').innerHTML  = Patm + '<span class="ic-unit"> mmHg</span>';
  document.getElementById('ivPw').innerHTML    = Pw.toFixed(1) + '<span class="ic-unit"> mmHg</span>';
  document.getElementById('ivW').innerHTML     = Math.round(prog*100) + '<span class="ic-unit"> %</span>';
}
function setStep(s) { for(let i=0;i<=4;i++) document.getElementById('sp'+i).classList.toggle('active',i<=s); }

document.getElementById('sT').addEventListener('input', e => { T=+e.target.value; document.getElementById('vT').textContent=T+' °C'; updateCards(); });
document.getElementById('sP').addEventListener('input', e => { Patm=+e.target.value; document.getElementById('vP').textContent=Patm+' mmHg'; updateCards(); });
document.getElementById('btnPlay').addEventListener('click', () => {
  if(!running){ running=true; document.getElementById('btnPlay').textContent='⏸ Pause'; loop(); }
  else { running=false; document.getElementById('btnPlay').textContent='▶ Resume'; cancelAnimationFrame(fid); }
});
document.getElementById('btnReset').addEventListener('click', () => {
  running=false; cancelAnimationFrame(fid);
  prog=0; bubbles=[]; flamePulse=0; wave=0;
  document.getElementById('btnPlay').textContent='▶ Start';
  setStep(0); updateCards(); draw();
});

// ─── LOOP ────────────────────────────────────────────────────────────────────
function loop() {
  if(!running) return;
  flamePulse += 0.09; wave += 0.05;
  const rate = T<50 ? 0.0005 : T<80 ? 0.0016 : 0.003;
  if(prog<1){ prog=Math.min(1,prog+rate); updateCards(); }
  if(T>=50 && prog<1 && Math.random()<0.13*(T/100)) spawnBubble();
  bubbles.forEach(b => b.t += 0.014);
  bubbles = bubbles.filter(b => b.t < 1);
  if(prog<.05) setStep(0); else if(prog<.2) setStep(1);
  else if(prog<.5) setStep(2); else if(prog<.95) setStep(3);
  else { setStep(4); if(prog>=1){ running=false; document.getElementById('btnPlay').textContent='▶ Start'; } }
  draw();
  if(running) fid = requestAnimationFrame(loop);
}

function spawnBubble() {
  bubbles.push({ t:0, r:2.5+Math.random()*2.5, wobble:Math.random()*Math.PI*2 });
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,LW,LH);
  drawBg();
  drawStand();
  drawFlame();
  drawTube();        // tube behind everything
  drawFlask();
  drawTrough();
  drawCylinder();
  drawBubbles();
  drawLabels();
}

function drawBg() {
  const g=ctx.createLinearGradient(0,0,0,LH);
  g.addColorStop(0,'#f8fafd'); g.addColorStop(1,'#eef2f9');
  ctx.fillStyle=g; ctx.fillRect(0,0,LW,LH);
}

// ── Stand & burner ──
function drawStand() {
  // Base plate
  ctx.fillStyle='#8899bb';
  ctx.beginPath(); ctx.roundRect(30,406,140,13,4); ctx.fill();
  // Vertical rod
  const rg=ctx.createLinearGradient(ROD_x-4,0,ROD_x+4,0);
  rg.addColorStop(0,'#c0c8d8'); rg.addColorStop(.5,'#e0e6f0'); rg.addColorStop(1,'#a0a8b8');
  ctx.fillStyle=rg; ctx.fillRect(ROD_x-4,100,8,310);
  // Clamp
  ctx.fillStyle='#7888aa'; ctx.beginPath(); ctx.roundRect(ROD_x-14,200,28,12,3); ctx.fill();
  // Burner stand legs
  ctx.strokeStyle='#8899bb'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(52,404); ctx.lineTo(70,354); ctx.moveTo(142,404); ctx.lineTo(124,354); ctx.stroke();
  // Burner ring
  ctx.fillStyle='#778899'; ctx.beginPath(); ctx.roundRect(64,344,76,13,3); ctx.fill();
  // Burner barrel
  ctx.fillStyle='#8899bb'; ctx.beginPath(); ctx.roundRect(80,306,40,40,3); ctx.fill();
}
const ROD_x = 268;

function drawFlame() {
  const bx=100, by=306;
  const alpha = T>=50 ? 1 : Math.max(0,(T-20)/30);
  if(alpha<=0) return;
  ctx.save(); ctx.globalAlpha=alpha;
  const fH=30+Math.sin(flamePulse)*5, fW=14+Math.sin(flamePulse*1.4)*3;
  const og=ctx.createRadialGradient(bx,by-fH*.5,0,bx,by,fW);
  og.addColorStop(0,'#fff9c4'); og.addColorStop(.35,'#ffa726'); og.addColorStop(.8,'#ff6f00'); og.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=og; ctx.beginPath(); ctx.ellipse(bx,by-fH*.38,fW*.65,fH*.68,0,0,Math.PI*2); ctx.fill();
  const ig=ctx.createRadialGradient(bx,by-5,0,bx,by,8);
  ig.addColorStop(0,'#e3f2fd'); ig.addColorStop(.5,'#29b6f6'); ig.addColorStop(1,'rgba(41,182,246,0)');
  ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(bx,by-4,6,10,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Round-bottom flask ──
function drawFlask() {
  const {x,y,w,h,neckW,neckH}=FL;
  const cx=FL_CX, bodyCY=y+h*.55;
  const bRx=w*.5, bRy=h*.48;

  ctx.save();
  if(T>=60){ ctx.shadowColor='#ff8800'; ctx.shadowBlur=16*Math.min(1,(T-60)/60); }
  // body
  const bg=ctx.createRadialGradient(cx-w*.15,bodyCY,w*.04,cx,bodyCY,w*.6);
  bg.addColorStop(0,'rgba(220,236,255,.92)'); bg.addColorStop(.5,'rgba(180,210,240,.55)'); bg.addColorStop(1,'rgba(100,160,210,.3)');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(cx,bodyCY,bRx,bRy,0,0,Math.PI*2); ctx.fill();
  // neck
  ctx.fillStyle='rgba(180,215,245,.45)'; ctx.fillRect(cx-neckW/2,y,neckW,neckH+6);
  ctx.restore();

  // powder
  ctx.save();
  ctx.beginPath(); ctx.ellipse(cx,bodyCY,bRx,bRy,0,0,Math.PI*2); ctx.clip();
  const sg=ctx.createLinearGradient(0,y+h-32,0,y+h+5);
  sg.addColorStop(0,'rgba(215,195,150,.85)'); sg.addColorStop(1,'rgba(175,155,115,.95)');
  ctx.fillStyle=sg; ctx.fillRect(x,y+h-30,w,35);
  if(T>=60&&prog>0.08){
    ctx.globalAlpha=.28+Math.sin(wave*2)*.14;
    const rg2=ctx.createRadialGradient(cx,y+h-14,2,cx,y+h-10,36);
    rg2.addColorStop(0,'#fff9c4'); rg2.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=rg2; ctx.fillRect(x,y+h-42,w,50);
  }
  ctx.restore();

  // outlines
  ctx.strokeStyle='rgba(80,130,180,.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cx,bodyCY,bRx,bRy,0,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=1.5; ctx.strokeRect(cx-neckW/2,y,neckW,neckH+6);

  // stopper
  ctx.fillStyle='#bb2222';
  ctx.beginPath(); ctx.roundRect(cx-neckW/2-3,STOPPER_Y-5,neckW+6,9,2); ctx.fill();
  ctx.fillStyle='#444'; ctx.fillRect(cx-TUBE_W/2,STOPPER_Y-6,TUBE_W,12);
}

// ── Delivery tube: stopper → right → down → along trough bottom → up into cylinder ──
function drawTube() {
  // Path points:
  // A: exit stopper (T_EXIT_X, T_EXIT_Y)
  // B: short horizontal exit (T_HORIZ_X, T_EXIT_Y)
  // C: bottom of drop column (T_DOWN_X, T_RUN_Y)
  // D: horizontal run end, below cylinder (T_UP_X, T_RUN_Y)
  // E: tip inside cylinder (T_UP_X, T_TIP_Y)

  function drawPath(offX, offY) {
    ctx.beginPath();
    ctx.moveTo(T_EXIT_X + offX, T_EXIT_Y + offY);
    // short horizontal exit
    ctx.lineTo(T_HORIZ_X + offX, T_EXIT_Y + offY);
    // smooth curve down to run level
    ctx.bezierCurveTo(
      T_HORIZ_X + offX + 35, T_EXIT_Y + offY,   // ctrl1: pull right
      T_DOWN_X  + offX,      T_RUN_Y + offY - 60, // ctrl2: pull up before run
      T_DOWN_X  + offX,      T_RUN_Y + offY       // end: run level
    );
    // horizontal run to below cylinder
    ctx.lineTo(T_UP_X + offX, T_RUN_Y + offY);
    // smooth rise into cylinder
    ctx.bezierCurveTo(
      T_UP_X + offX, T_RUN_Y + offY - 35,
      T_UP_X + offX, T_TIP_Y + offY + 35,
      T_UP_X + offX, T_TIP_Y + offY
    );
  }

  // Outer (glass rim)
  ctx.strokeStyle='rgba(100,145,190,.55)';
  ctx.lineWidth=TUBE_W+2; ctx.lineCap='round'; ctx.lineJoin='round';
  drawPath(0,0); ctx.stroke();

  // Main glass fill
  ctx.strokeStyle='rgba(155,192,222,.88)';
  ctx.lineWidth=TUBE_W;
  drawPath(0,0); ctx.stroke();

  // Inner highlight
  ctx.strokeStyle='rgba(220,240,255,.75)';
  ctx.lineWidth=TUBE_W-3;
  drawPath(-1.5,0); ctx.stroke();

  // Tube tip dot inside cylinder
  ctx.fillStyle='rgba(120,168,210,.8)';
  ctx.beginPath(); ctx.arc(T_UP_X, T_TIP_Y, TUBE_W/2+1.5, 0, Math.PI*2); ctx.fill();
}

// ── Rectangular trough ──
function drawTrough() {
  const {x,y,w,h}=TR;
  // shadow
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.12)'; ctx.shadowBlur=10; ctx.shadowOffsetY=4;
  ctx.fillStyle='rgba(200,225,245,.08)'; ctx.beginPath(); ctx.roundRect(x,y,w,h,6); ctx.fill();
  ctx.restore();

  // Water fill
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x+4,WATER_Y,w-8,h-(WATER_Y-y)-5,4); ctx.clip();
  const wg=ctx.createLinearGradient(0,WATER_Y,0,y+h-5);
  wg.addColorStop(0,'rgba(90,175,230,.72)'); wg.addColorStop(1,'rgba(50,130,200,.88)');
  ctx.fillStyle=wg; ctx.fillRect(x+4,WATER_Y,w-8,h);
  // ripples
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    const rx=x+50+i*100+Math.sin(wave+i*.9)*7;
    ctx.beginPath(); ctx.ellipse(rx,WATER_Y+6,18+i*4,3,0,0,Math.PI); ctx.stroke();
  }
  ctx.restore();

  // Glass walls
  ctx.strokeStyle='rgba(90,140,200,.65)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,6); ctx.stroke();
}

// ── Inverted collection cylinder ──
function drawCylinder() {
  const wTop = cylWaterTop();
  const gasH  = wTop - CY_ITOP;

  // Gas zone
  if(prog>0 && gasH>0){
    ctx.save();
    ctx.beginPath(); ctx.rect(CY_IX,CY_ITOP,CY_IW,gasH); ctx.clip();
    const gg=ctx.createLinearGradient(0,CY_ITOP,0,wTop);
    gg.addColorStop(0,'rgba(238,248,255,.97)'); gg.addColorStop(.7,'rgba(215,238,255,.7)'); gg.addColorStop(1,'rgba(195,225,255,.45)');
    ctx.fillStyle=gg; ctx.fillRect(CY_IX,CY_ITOP,CY_IW,gasH);
    // molecule dots
    ctx.globalAlpha=Math.min(1,prog*2);
    const nm=Math.floor(prog*20);
    for(let i=0;i<nm;i++){
      const mx=CY_IX+8+((i*43+11)%(CY_IW-16));
      const my=CY_ITOP+8+((i*29+7)%Math.max(1,gasH-16));
      ctx.fillStyle='rgba(85,155,225,.65)';
      ctx.beginPath(); ctx.arc(mx,my+Math.sin(wave+i*.9)*2,2.5,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // Water zone
  if(prog<1){
    const waterH=CY_IBOT-wTop;
    ctx.save();
    ctx.beginPath(); ctx.rect(CY_IX,wTop,CY_IW,waterH); ctx.clip();
    const cwg=ctx.createLinearGradient(0,wTop,0,CY_IBOT);
    cwg.addColorStop(0,'rgba(95,180,235,.78)'); cwg.addColorStop(1,'rgba(52,135,205,.9)');
    ctx.fillStyle=cwg; ctx.fillRect(CY_IX,wTop,CY_IW,waterH);
    ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(CY_IX,wTop); ctx.lineTo(CY_IX+CY_IW,wTop); ctx.stroke();
    ctx.restore();
  }

  // Glass walls (left, right, top — no bottom)
  ctx.fillStyle='rgba(175,210,240,.38)';
  ctx.fillRect(CY.x, CY.y, CY.wall, CY.h);            // left wall
  ctx.fillRect(CY.x+CY.w-CY.wall, CY.y, CY.wall, CY.h); // right wall
  ctx.fillRect(CY.x, CY.y, CY.w, CY.wall);             // top cap

  // Outline (3 sides, open bottom)
  ctx.strokeStyle='rgba(90,145,205,.72)'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(CY.x, CY_BOTTOM);
  ctx.lineTo(CY.x, CY.y);
  ctx.lineTo(CY.x+CY.w, CY.y);
  ctx.lineTo(CY.x+CY.w, CY_BOTTOM);
  ctx.stroke();

  // % label
  if(prog>0.05){
    ctx.fillStyle='rgba(26,39,68,.72)'; ctx.font='600 12px Inter'; ctx.textAlign='center';
    const labelY=Math.max(CY_ITOP+18, wTop-8);
    ctx.fillText(Math.round(prog*100)+'% O₂', CY_CX, labelY);
  }
}

// ── Bubbles ──
// Segments matching tube path:
// 0.00–0.10 : horizontal exit from stopper
// 0.10–0.40 : bezier curve down to T_RUN_Y
// 0.40–0.62 : horizontal run to T_UP_X
// 0.62–0.76 : rise through run→tip
// 0.76–1.00 : bubble rises in cylinder water
function getBubbleXY(b) {
  const t   = b.t;
  const wTop = cylWaterTop();
  if(t < 0.10){
    const s=t/0.10;
    return { x:T_EXIT_X+(T_HORIZ_X-T_EXIT_X)*s, y:T_EXIT_Y, w:false };
  } else if(t < 0.40){
    const s=(t-0.10)/0.30;
    const p0x=T_HORIZ_X,p0y=T_EXIT_Y;
    const p1x=T_HORIZ_X+35,p1y=T_EXIT_Y;
    const p2x=T_DOWN_X,p2y=T_RUN_Y-60;
    const p3x=T_DOWN_X,p3y=T_RUN_Y;
    const bx=Math.pow(1-s,3)*p0x+3*Math.pow(1-s,2)*s*p1x+3*(1-s)*s*s*p2x+s*s*s*p3x;
    const by=Math.pow(1-s,3)*p0y+3*Math.pow(1-s,2)*s*p1y+3*(1-s)*s*s*p2y+s*s*s*p3y;
    return { x:bx, y:by, w:false };
  } else if(t < 0.62){
    const s=(t-0.40)/0.22;
    return { x:T_DOWN_X+(T_UP_X-T_DOWN_X)*s, y:T_RUN_Y, w:false };
  } else if(t < 0.76){
    const s=(t-0.62)/0.14;
    return { x:T_UP_X, y:T_RUN_Y+(T_TIP_Y-T_RUN_Y)*s, w:false };
  } else {
    const s=(t-0.76)/0.24;
    const bx=CY_IX+CY_IW/2+Math.sin(b.wobble+b.t*14)*10;
    return { x:bx, y:T_TIP_Y+(wTop+4-T_TIP_Y)*s, w:true };
  }
}

function drawBubbles() {
  bubbles.forEach(b => {
    const p=getBubbleXY(b);
    ctx.save();
    if(p.w){
      ctx.fillStyle='rgba(255,255,255,.88)';
      ctx.strokeStyle='rgba(135,195,240,.85)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(p.x,p.y,b.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(p.x-b.r*.3,p.y-b.r*.35,b.r*.28,0,Math.PI*2); ctx.fill();
    } else {
      ctx.globalAlpha=.4;
      ctx.fillStyle='rgba(210,232,255,.75)';
      ctx.beginPath(); ctx.arc(p.x,p.y,b.r*.7,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

// ── Labels ──
function drawLabels() {
  ctx.textAlign='center';
  // Flask label
  ctx.fillStyle='rgba(26,39,68,.82)'; ctx.font='600 12px Inter';
  ctx.fillText('KClO₃ + MnO₂', FL_CX, FL.y+FL.h+FL.neckH+30);
  ctx.fillStyle='#5a6a8a'; ctx.font='500 11px Inter';
  ctx.fillText('(heated)', FL_CX, FL.y+FL.h+FL.neckH+45);

  // Tube label
  ctx.fillStyle='rgba(26,39,68,.62)'; ctx.font='500 11px Inter';
  ctx.fillText('O₂ + H₂O vapor', (T_HORIZ_X+T_UP_X)/2, T_RUN_Y+22);

  // Trough label
  ctx.fillStyle='rgba(26,39,68,.75)'; ctx.font='600 12px Inter';
  ctx.fillText('Water trough', TR.x+TR.w/2, TR.y+TR.h+18);

  // Cylinder
  ctx.fillText('Collection Cylinder', CY_CX, CY.y-14);

  // Water level equality dashed line
  if(prog<0.05){
    ctx.save();
    ctx.setLineDash([5,4]); ctx.strokeStyle='rgba(201,168,76,.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(TR.x+10,WATER_Y); ctx.lineTo(CY.x+CY.w+8,WATER_Y); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='rgba(138,96,16,.6)'; ctx.font='500 10px Inter'; ctx.textAlign='left';
    ctx.fillText('same water level', TR.x+14, WATER_Y-5);
  }
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function resize() {
  const W=cvs.parentElement.clientWidth;
  const H=Math.round(W*LH/LW);
  const dpr=window.devicePixelRatio||1;
  cvs.width=W*dpr; cvs.height=H*dpr;
  cvs.style.width=W+'px'; cvs.style.height=H+'px';
  ctx.setTransform(W*dpr/LW,0,0,H*dpr/LH,0,0);
  draw();
}
new ResizeObserver(resize).observe(cvs.parentElement);
updateCards();
</script>
